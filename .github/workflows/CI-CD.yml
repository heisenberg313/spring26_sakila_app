name: Sakila CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- STAGE 1: Linting ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Flake8
        run: pip install flake8
      - name: Run Linting
        # Requirement: Max line length 120, ignore specific errors
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=120 --extend-ignore=E501,W503

  # --- STAGE 2: Testing with MySQL Service ---
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      # Requirement: Use a Service Container for MySQL
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pymysql
      
      - name: Import Sakila Data
        # Requirement: Import schema/data into the service container
        run: |
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-db/sakila-data.sql
        
    - name: Run Pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_ROOT_PASSWORD: admin
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v

  # --- STAGE 3: Build & Security Scan ---
  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Local Image
        run: docker build -t sakila-app:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        # Requirement: Use Trivy and export results
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sakila-app:${{ github.sha }}'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Upload Security Report
        # Requirement: Upload results as an Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: trivy-results.json

  # --- STAGE 4: Docker Hub Push (CD) ---
  push-to-docker-hub:
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: malijutt/sakilaappspring:latest
